<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Registry Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <style>
        :root { --atticl-purple: #8F5BFD; --atticl-black: #000; --atticl-gray: #121212; --atticl-border: #333; --atticl-white: #FFF; }
        body { font-family: 'Poppins', sans-serif; max-width: 400px; margin: 80px auto; padding: 0 20px; background-color: var(--atticl-black); color: var(--atticl-white); }
        .card { background-color: var(--atticl-gray); padding: 40px; border-radius: 8px; border: 1px solid var(--atticl-border); text-align: center; }
        h2 { margin-top: 0; color: var(--atticl-purple); }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 0.9rem; margin-bottom: 8px; color: #A0A0A0; }
        input { width: 100%; box-sizing: border-box; padding: 12px; background-color: #000; border: 1px solid var(--atticl-border); color: #FFF; border-radius: 5px; font-family: inherit; }
        input:focus { outline: none; border-color: var(--atticl-purple); }
        button { width: 100%; padding: 12px; background-color: var(--atticl-purple); color: #FFF; border: none; border-radius: 5px; font-weight: 600; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        button:hover { opacity: 0.9; }
        .link { display: block; margin-top: 20px; color: #A0A0A0; font-size: 0.9rem; text-decoration: none; }
        .link:hover { color: var(--atticl-purple); }
        #message { margin-top: 15px; font-size: 0.9rem; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Create an Account</h2>
        <form id="registerForm">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" required autocomplete="off">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit">Register</button>
        </form>
        <div id="message"></div>
        <a href="/login" class="link">Already have an account? Log in</a>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const msgBox = document.getElementById('message');

            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const text = await res.text();
            msgBox.style.display = 'block';
            
            if (res.ok) {
                msgBox.style.color = '#10B981'; // Green
                msgBox.innerText = text;
                setTimeout(() => window.location.href = '/login', 2000);
            } else {
                msgBox.style.color = '#EF4444'; // Red
                msgBox.innerText = "Error: " + text;
            }
        });
    </script>
</body>
</html>
