<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard | Registry</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <style>
        :root { --atticl-purple: #8F5BFD; --atticl-black: #000; --atticl-gray: #121212; --atticl-border: #333; --atticl-white: #FFF; --atticl-text-muted: #A0A0A0;}
        body { font-family: 'Poppins', sans-serif; max-width: 1000px; margin: 0 auto; padding: 20px; background-color: var(--atticl-black); color: var(--atticl-white); }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--atticl-border); margin-bottom: 40px; }
        .logo { font-size: 1.5rem; font-weight: 600; color: var(--atticl-purple); text-decoration: none; display: flex; align-items: center; gap: 8px; }
        
        .card { background-color: var(--atticl-gray); padding: 30px; border-radius: 8px; border: 1px solid var(--atticl-border); margin-bottom: 20px; }
        h1 { margin-top: 0; display: flex; align-items: center; gap: 10px; }
        
        .tabs { display: flex; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid var(--atticl-border); }
        .tab { padding: 10px 20px; cursor: pointer; color: var(--atticl-text-muted); font-weight: 600; transition: all 0.2s; }
        .tab.active { color: var(--atticl-purple); border-bottom: 2px solid var(--atticl-purple); }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--atticl-border); }
        th { color: var(--atticl-text-muted); font-weight: 600; text-transform: uppercase; font-size: 0.8rem; }
        
        .verify-btn, .action-btn { background: none; border: 1px solid var(--atticl-border); color: var(--atticl-white); padding: 5px 12px; border-radius: 5px; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.2s; font-family: inherit; }
        .verify-btn.active { border-color: var(--atticl-purple); color: var(--atticl-purple); }
        .verify-btn:hover, .action-btn:hover { background: rgba(143, 91, 253, 0.1); }

        select { background: var(--atticl-black); color: var(--atticl-white); border: 1px solid var(--atticl-border); padding: 5px; border-radius: 5px; font-family: inherit; outline: none; }
        select:focus { border-color: var(--atticl-purple); }

        .checkmark { color: var(--atticl-purple); }
        #loading { text-align: center; padding: 40px; color: var(--atticl-text-muted); }
        #error-msg { text-align: center; padding: 40px; color: #ff4444; display: none; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="logo"><span class="material-symbols-outlined">box</span> Registry</a>
        <a href="/" style="color: var(--atticl-white); text-decoration: none;">Back to Site</a>
    </nav>

    <div class="card">
        <h1><span class="material-symbols-outlined">dashboard</span> Staff Dashboard</h1>
        <p style="color: var(--atticl-text-muted);">Manage package verifications and user permissions.</p>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('packages')">Packages</div>
            <div class="tab" onclick="switchTab('users')">Users</div>
        </div>

        <div id="loading">Loading dashboard data...</div>
        <div id="error-msg">Failed to load data. Are you a staff member?</div>

        <div id="packages-section">
            <table id="package-table" class="hidden">
                <thead>
                    <tr>
                        <th>Package Name</th>
                        <th>Downloads</th>
                        <th>Verified</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="package-list"></tbody>
            </table>
        </div>

        <div id="users-section" class="hidden">
            <table id="user-table">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Current Tier</th>
                        <th>Change Tier</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="user-list"></tbody>
            </table>
        </div>
    </div>

    <script>
        let currentTab = 'packages';

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            if (tab === 'packages') {
                document.getElementById('packages-section').classList.remove('hidden');
                document.getElementById('users-section').classList.add('hidden');
                loadPackages();
            } else {
                document.getElementById('packages-section').classList.add('hidden');
                document.getElementById('users-section').classList.remove('hidden');
                loadUsers();
            }
        }

        async function loadPackages() {
            const token = localStorage.getItem('pkgd_token');
            try {
                const res = await fetch('/api/admin/dashboard', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.ok) {
                    const packages = await res.json();
                    renderPackages(packages);
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('package-table').classList.remove('hidden');
                } else {
                    showError();
                }
            } catch (err) {
                console.error(err);
                showError();
            }
        }

        function renderPackages(packages) {
            const list = document.getElementById('package-list');
            list.innerHTML = packages.map(pkg => `
                <tr>
                    <td style="font-weight: 600;">${pkg.name}</td>
                    <td>${pkg.downloads}</td>
                    <td>
                        ${pkg.is_verified ? '<span class="material-symbols-outlined checkmark">verified</span>' : '<span style="color: var(--atticl-text-muted);">No</span>'}
                    </td>
                    <td>
                        <button class="verify-btn ${pkg.is_verified ? 'active' : ''}" onclick="toggleVerify('${pkg.name}', ${pkg.is_verified})">
                            <span class="material-symbols-outlined">verified</span>
                            ${pkg.is_verified ? 'Unverify' : 'Verify'}
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        async function loadUsers() {
            const token = localStorage.getItem('pkgd_token');
            try {
                const res = await fetch('/api/admin/users', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.ok) {
                    const users = await res.json();
                    renderUsers(users);
                    document.getElementById('loading').style.display = 'none';
                } else {
                    showError();
                }
            } catch (err) {
                console.error(err);
                showError();
            }
        }

        function renderUsers(users) {
            const list = document.getElementById('user-list');
            const tiers = ['member', 'supporter', 'partner', 'verified', 'staff'];
            
            list.innerHTML = users.map(user => `
                <tr>
                    <td style="font-weight: 600;">${user.username}</td>
                    <td><span class="badge" style="text-transform: capitalize;">${user.tier}</span></td>
                    <td>
                        <select id="tier-select-${user.username}">
                            ${tiers.map(t => `<option value="${t}" ${user.tier === t ? 'selected' : ''}>${t.charAt(0).toUpperCase() + t.slice(1)}</option>`).join('')}
                        </select>
                    </td>
                    <td>
                        <button class="action-btn" onclick="updateTier('${user.username}')">
                            <span class="material-symbols-outlined">upgrade</span> Update
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        async function updateTier(username) {
            const token = localStorage.getItem('pkgd_token');
            const tier = document.getElementById(`tier-select-${username}`).value;

            try {
                const res = await fetch('/api/admin/upgrade-user', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ username, tier })
                });

                if (res.ok) {
                    alert(`User ${username} updated to ${tier}.`);
                    loadUsers();
                } else {
                    alert("Failed to update user tier.");
                }
            } catch (err) {
                console.error(err);
                alert("An error occurred.");
            }
        }

        async function toggleVerify(name, currentStatus) {
            const token = localStorage.getItem('pkgd_token');
            try {
                const res = await fetch('/api/admin/verify', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ name, verified: !currentStatus })
                });

                if (res.ok) {
                    loadPackages();
                } else {
                    alert("Failed to update status.");
                }
            } catch (err) {
                console.error(err);
                alert("An error occurred.");
            }
        }

        function showError() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error-msg').style.display = 'block';
        }

        loadPackages();
    </script>
</body>
</html>
