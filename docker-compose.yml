version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pkgd-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=pkgd_registry
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pkgd_registry"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  registry:
    build: .
    container_name: pkgd-registry
    restart: unless-stopped
    ports:
      - "9999:9999"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/pkgd_registry
      - RUST_LOG=info,pkgd_registry_server=debug,tower_http=info
    depends_on:
      - db
    volumes:
      - registry_storage:/app/storage
    networks:
      - internal
      - nginx

networks:
  internal:
  nginx:
    external: true

volumes:
  registry_storage:
    name: registry_storage
  postgres_data:
