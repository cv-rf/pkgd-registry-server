version: '3.8'

services:
  registry:
    build: .
    image: pkgd-registry-server:latest
    container_name: pkgd-registry
    restart: unless-stopped
    ports:
      - "9999:9999"
    environment:
      # Use the DATABASE_URL from the host/Portainer environment
      - DATABASE_URL=${DATABASE_URL}
      - RUST_LOG=info,pkgd_registry_server=debug,tower_http=info
    volumes:
      - registry_storage:/app/storage
    networks:
      - database_default

networks:
  database_default:
    external: true

volumes:
  # Named volumes for persistent storage
  registry_storage:
    name: registry_storage
