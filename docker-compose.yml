version: '3.8'

services:
  registry:
    image: ghcr.io/cv-rf/pkgd-registry-server:latest
    container_name: pkgd-registry
    restart: unless-stopped
    ports:
      - "9999:9999"
    environment:
      - DATABASE_URL=postgres://atticl:XUk2k1BSm8nztlW5gz8U93qDPPoCLQ@172.21.0.2:5432/tornhost_db
      - RUST_LOG=info,pkgd_registry_server=debug,tower_http=info
    volumes:
      - registry_storage:/app/storage
    networks:
      - database_default
      - nginx

networks:
  database_default:
    external: true
  nginx:
    external: true

volumes:
  registry_storage:
    name: registry_storage
