version: '3.8'

services:
  registry:
    build: .
    image: pkgd-registry-server:latest
    container_name: pkgd-registry
    restart: unless-stopped
    ports:
      - "9999:9999"
    environment:
      # Database connection string pointing to the mounted volume
      - DATABASE_URL=sqlite:/app/data/registry.db?mode=rwc
      - RUST_LOG=info,pkgd_registry_server=debug,tower_http=info
    volumes:
      - registry_data:/app/data
      - registry_storage:/app/storage

volumes:
  # Named volumes for persistent storage
  registry_data:
    name: registry_data
  registry_storage:
    name: registry_storage